services:

  # ---------------------------------------------------------------------------
  # GitLab CE — Ticketing, versionning, CI/CD (EPIC-01 / US-01)
  # ---------------------------------------------------------------------------
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: always
    hostname: gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD}'

        # Memory tuning — cible ~3-4 GB au lieu de 10 GB par défaut
        puma['worker_processes'] = 2
        puma['min_threads'] = 1
        puma['max_threads'] = 4
        sidekiq['max_concurrency'] = 10

        # Désactive les services de monitoring intégrés (inutiles en local)
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false

        # Réduit les buffers PostgreSQL embarqué
        postgresql['shared_buffers'] = '256MB'
        postgresql['max_connections'] = 100
    ports:
      - "80:80"
      - "2222:22"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # GitLab Runner — Exécuteur CI/CD (EPIC-01 / US-02)
  # ---------------------------------------------------------------------------
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: always
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - factory-network
    depends_on:
      gitlab:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # SonarQube DB — PostgreSQL 15 (EPIC-01 / US-03)
  # ---------------------------------------------------------------------------
  sonarqube-db:
    image: postgres:15
    container_name: sonarqube-db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONARQUBE_DB_PASSWORD}
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # SonarQube Community Edition — Static analysis (EPIC-01 / US-03)
  # Prérequis hôte : sysctl -w vm.max_map_count=524288 (Elasticsearch intégré)
  # ---------------------------------------------------------------------------
  sonarqube:
    image: mc1arke/sonarqube-with-community-branch-plugin:latest
    container_name: sonarqube
    restart: always
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONARQUBE_DB_PASSWORD}
    ports:
      - "9000:9000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Temporal DB — PostgreSQL 15 dédié à Temporal (EPIC-01 / US-05)
  # ---------------------------------------------------------------------------
  temporal-db:
    image: postgres:15
    container_name: temporal-db
    restart: always
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD}
      POSTGRES_DB: temporal
    volumes:
      - temporal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Temporal Server — Orchestrateur de workflows (EPIC-01 / US-05)
  # auto-setup : initialise le schéma DB et le namespace "default" au premier démarrage
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.29.6
    container_name: temporal
    restart: always
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=temporal-db
    ports:
      - "7233:7233"
      - "7243:7243"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Temporal UI — Interface web (EPIC-01 / US-05)
  # ---------------------------------------------------------------------------
  temporal-ui:
    image: temporalio/ui:2.49.1
    container_name: temporal-ui
    restart: always
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    ports:
      - "8080:8080"
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Temporal Worker de test — valide l'enregistrement d'un worker (EPIC-01 / US-05)
  # Retry automatique jusqu'à ce que le namespace factory-test soit créé
  # via setup-temporal.sh
  # ---------------------------------------------------------------------------
  temporal-worker-test:
    build:
      context: ./temporal-worker-test
    container_name: temporal-worker-test
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=factory-test
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # MCP GitLab — Serveur MCP exposant les outils GitLab aux agents (EPIC-02)
  # Build requis avant up : cd mcp/gitlab && npm run build
  # ---------------------------------------------------------------------------
  mcp-gitlab:
    build:
      context: ../mcp/gitlab
      dockerfile: Dockerfile
    container_name: mcp-gitlab
    restart: unless-stopped
    environment:
      PORT: "3000"
      GITLAB_API_URL: "http://gitlab/api/v4"
      GITLAB_API_TOKEN: "${GITLAB_API_TOKEN}"
    expose:
      - "3000"
    ports:
      - "3001:3000"
    networks:
      - factory-network
    depends_on:
      gitlab:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # MCP Temporal — Wrapper MCP exposant les outils Temporal aux agents (EPIC-02)
  # Build requis avant up : cd mcp/temporal && npm run build
  # ---------------------------------------------------------------------------
  mcp-temporal:
    build:
      context: ../mcp/temporal
      dockerfile: Dockerfile
    container_name: mcp-temporal
    restart: unless-stopped
    environment:
      PORT: "3000"
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_NAMESPACE: "factory"
    expose:
      - "3000"
    ports:
      - "3003:3000"
    networks:
      - factory-network
    depends_on:
      temporal:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Pipeline Worker — Temporal worker TypeScript orchestrant le pipeline dev→merge (EPIC-04)
  # Build requis avant up : npm run build -w @factory/worker-pipeline
  # ---------------------------------------------------------------------------
  pipeline-worker:
    build:
      context: ../workers
      dockerfile: pipeline/Dockerfile
    container_name: pipeline-worker
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_NAMESPACE: "factory"
      TEMPORAL_TASK_QUEUE: "factory-pipeline"
      GITLAB_API_INTERNAL_URL: "http://gitlab/api/v4"
      GITLAB_API_TOKEN: "${GITLAB_API_TOKEN}"
      HUMAN_IN_THE_LOOP: "${HUMAN_IN_THE_LOOP:-false}"
      HUMAN_IN_THE_LOOP_TIMEOUT: "${HUMAN_IN_THE_LOOP_TIMEOUT:-24 hours}"
      HEALTH_PORT: "9091"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9091/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - factory-network
    depends_on:
      temporal:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Agent Worker — Temporal worker partagé pour agents EPIC-05 à EPIC-09
  # Build requis avant up : npm run build -w @factory/worker-agents
  # Prérequis : ANTHROPIC_API_KEY doit être renseigné dans infrastructure/.env
  # ---------------------------------------------------------------------------
  agent-worker:
    build:
      context: ../workers
      dockerfile: agents/Dockerfile
    container_name: agent-worker
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_NAMESPACE: "factory"
      TEMPORAL_TASK_QUEUE: "factory-agents"
      GITLAB_API_INTERNAL_URL: "http://gitlab/api/v4"
      GITLAB_API_TOKEN: "${GITLAB_API_TOKEN}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      MCP_GITLAB_INTERNAL_URL: "http://mcp-gitlab:3000/mcp"
      MCP_TEMPORAL_INTERNAL_URL: "http://mcp-temporal:3000/mcp"
      MCP_SONARQUBE_INTERNAL_URL: "http://mcp-sonarqube:3000/mcp"
      HEALTH_PORT: "9090"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - factory-network
    depends_on:
      temporal:
        condition: service_healthy
      mcp-gitlab:
        condition: service_started
      mcp-temporal:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Review Worker — Temporal worker pour l'agent de revue (EPIC-06)
  # Task queue : review-agent
  # Build requis avant up : npm run build -w @factory/worker-review
  # ---------------------------------------------------------------------------
  review-worker:
    build:
      context: ../workers
      dockerfile: review-worker/Dockerfile
    container_name: review-worker
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_NAMESPACE: "factory"
      TEMPORAL_TASK_QUEUE: "review-agent"
      GITLAB_API_INTERNAL_URL: "http://gitlab/api/v4"
      GITLAB_API_TOKEN: "${GITLAB_API_TOKEN}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      MCP_GITLAB_INTERNAL_URL: "http://mcp-gitlab:3000/mcp"
      HEALTH_PORT: "9092"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:9092/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - factory-network
    depends_on:
      temporal:
        condition: service_healthy
      mcp-gitlab:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Portainer CE — Monitoring et gestion des containers (UI web)
  # UI HTTPS : http://localhost:9443  |  Edge agent tunnel : 8000
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # MCP SonarQube — Serveur MCP officiel SonarSource (EPIC-02)
  # Image    : mcp/sonarqube (https://hub.docker.com/r/mcp/sonarqube)
  # Endpoint : /mcp  (confirmé — https://docs.sonarsource.com/sonarqube-mcp-server/build-and-configure/configure)
  # Accès interne (conteneur→conteneur) : http://mcp-sonarqube:3000/mcp
  # Accès hôte (tests round-trip)       : http://localhost:3002/mcp  (port 3002 → container 3000)
  # ---------------------------------------------------------------------------
  mcp-sonarqube:
    image: mcp/sonarqube
    container_name: mcp-sonarqube
    restart: unless-stopped
    environment:
      SONARQUBE_URL: "http://sonarqube:9000"
      SONARQUBE_TOKEN: "${SONARQUBE_AGENT_TOKEN}"
      SONARQUBE_TRANSPORT: "http"
      SONARQUBE_HTTP_HOST: "0.0.0.0"
      SONARQUBE_HTTP_PORT: "3000"
    expose:
      - "3000"
    ports:
      - "3002:3000"
    networks:
      - factory-network
    depends_on:
      sonarqube:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Chat UI — Application web de qualification (EPIC-03 / US-01)
  # Port hôte 3000 est libre (mcp-gitlab occupe 3001:3000)
  # ---------------------------------------------------------------------------
  chat:
    build:
      context: ../apps
      dockerfile: Dockerfile
    container_name: chat
    restart: unless-stopped
    env_file:
      - ../apps/.env
    environment:
      NUXT_PORT: "3000"
      NUXT_GITLAB_INTERNAL_URL: "http://gitlab"
    ports:
      - "${NUXT_PORT:-3000}:3000"
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Loki — Agrégateur de logs (observabilité)
  # Interne uniquement — accessible sur factory-network via loki:3100
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Promtail — Collecteur de logs Docker → Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/promtail
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # Grafana — UI de visualisation des logs
  # URL : http://localhost:${GRAFANA_PORT:-3100}
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana-oss:11.6.1
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - factory-network

  # ---------------------------------------------------------------------------
  # PlantUML Server — Génération de diagrammes PNG/SVG via HTTP
  # URL : http://localhost:${PLANTUML_PORT:-8081}
  # API : GET /png/<encoded> ou GET /svg/<encoded>
  # Interne : http://plantuml:8080
  # ---------------------------------------------------------------------------
  plantuml:
    image: plantuml/plantuml-server:jetty
    container_name: plantuml
    restart: unless-stopped
    ports:
      - "${PLANTUML_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - factory-network

networks:
  factory-network:
    name: factory-network
    driver: bridge

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_config:
  sonarqube_db:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  temporal_db:
  portainer_data:
  loki_data:
  grafana_data:
  promtail_positions:
