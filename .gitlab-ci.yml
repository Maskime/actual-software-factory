variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

# Files that actually require test/analysis. Jobs are skipped when only
# documentation files (README.md, CLAUDE.md, docs/, …) change.
.source_paths: &source_paths
  - "**/*.ts"
  - "**/*.vue"
  - "package*.json"
  - ".gitlab-ci.yml"
  - "vitest.workspace.ts"
  - "sonar-project.properties"
  - "infrastructure/**/*"

stages:
  - test
  - build-sonar
  - mirror


test:
  stage: test
  image: node:22
  script:
    - npm ci
    - npm run test:coverage -w @factory/mcp-gitlab
    - npx nuxi prepare --cwd apps/chat
    - npm run test:coverage -w @factory/chat
  artifacts:
    when: always
    paths:
      - mcp/gitlab/coverage/
      - apps/chat/coverage/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'master'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'main'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'develop'
      changes: *source_paths


typecheck:
  stage: test
  image: node:22
  script:
    - npm ci
    - npm run typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'master'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'main'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'develop'
      changes: *source_paths


build-sonar:
  stage: build-sonar
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  needs:
    - test
    - typecheck
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
      - sonar-scanner/
  script:
    - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'master'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'main'
      changes: *source_paths
    - if: $CI_COMMIT_BRANCH == 'develop'
      changes: *source_paths


mirror-to-github:
  stage: mirror
  image:
    name: alpine/git
    entrypoint: [""]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$GITHUB_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - git remote add github git@github.com:Maskime/actual-software-factory.git
    - git push github "+refs/remotes/origin/*:refs/heads/*"
    - git push github --tags --force
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
